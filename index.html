<!DOCTYPE html>
<html>
<head>
  <title>Sakib Store</title>
  <style>
    body { font-family: Arial; margin:0; background:#f1f5f9; }
    header { background:#0f172a; color:white; padding:15px; text-align:center; }
    .container { padding:20px; text-align:center; }
    .card {
      display:inline-block;
      width:200px;
      background:white;
      margin:10px;
      padding:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    button {
      background:#22c55e;
      color:white;
      border:none;
      padding:10px;
      cursor:pointer;
      border-radius:5px;
    }
  </style>
</head>
<body>

<header>
  <h1>Sakib Mobile & Medical Store</h1>
</header>

<div class="container">
  <h2>📱 Mobile Products</h2>

  <div class="card">
    <h3>iPhone</h3>
    <p>₹50000</p>
    <button onclick="order()">Order</button>
  </div>

  <div class="card">
    <h3>Samsung</h3>
    <p>₹20000</p>
    <button onclick="order()">Order</button>
  </div>

  <h2>💊 Medicines</h2>

  <div class="card">
    <h3>Paracetamol</h3>
    <p>₹50</p>
    <button onclick="order()">Order</button>
  </div>

  <div class="card">
    <h3>Vitamin Tablets</h3>
    <p>₹100</p>
    <button onclick="order()">Order</button>
  </div>
</div>

<script>
function order(){
  window.open("https://wa.me/91XXXXXXXXXX");
}
</script>

</body>
</html>
